\
#!/usr/bin/env bash
set -euo pipefail

_GLOBAL_SELF_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
BASE_DIR="${MINECRAFT_BASE_DIR:-$(cd "${_GLOBAL_SELF_DIR}/.." && pwd)}"

CONFIG_DIR="${BASE_DIR}/config"
SERVER_CONFIG_DIR="${CONFIG_DIR}/servers"
ARCHIVED_CONFIG_DIR="${CONFIG_DIR}/archived"

SCRIPTS_DIR="${BASE_DIR}/scripts"
TOOLS_DIR="${BASE_DIR}/tools"
TEMPLATES_DIR="${BASE_DIR}/templates"
SERVERS_DIR="${BASE_DIR}/servers"

RUNTIME_DIR="${BASE_DIR}/runtime"
STATE_DIR="${RUNTIME_DIR}/state"
LOGS_DIR="${RUNTIME_DIR}/logs"
EVENTS_DIR="${RUNTIME_DIR}/events"
RESTORE_DIR="${RUNTIME_DIR}/restore"
TMP_DIR="${RUNTIME_DIR}/tmp"
CRASH_DIR="${RUNTIME_DIR}/crash"

BACKUPS_DIR="${BASE_DIR}/backups"
LOCAL_BACKUPS_DIR="${BACKUPS_DIR}/local"
BACKUP_MANIFESTS_DIR="${BACKUPS_DIR}/manifests"

ARCHIVES_DIR="${BASE_DIR}/archives"
ARCHIVE_SERVERS_DIR="${ARCHIVES_DIR}/servers"
ARCHIVE_BACKUPS_DIR="${ARCHIVES_DIR}/backups"

TESTS_DIR="${BASE_DIR}/tests"
ACTIVE_SERVER_FILE="${BASE_DIR}/active_server.txt"

SYSTEMD_DIR="${SYSTEMD_DIR:-/etc/systemd/system}"
PLATFORM_NAME="Minecraft Server Manager"
PLATFORM_VERSION="v3"

DEFAULT_TEMPLATE_NAME="blank-neoforge"
DEFAULT_DISPLAY_NAME="Minecraft Server"
DEFAULT_START_SCRIPT_NAME="startserver.sh"
DEFAULT_UNIX_ARGS_FILE="unix_args.txt"

DEFAULT_JAVA_BIN="$(command -v java 2>/dev/null || true)"
DEFAULT_MCRCON="$(command -v mcrcon 2>/dev/null || echo /usr/local/bin/mcrcon)"

DEFAULT_GAME_PORT="25565"
DEFAULT_RCON_HOST="127.0.0.1"
DEFAULT_RCON_PORT="25575"
DEFAULT_RCON_PASSWORD="changeme"

DEFAULT_BACKUP_ON_CALENDAR="*:0/30"
DEFAULT_ENABLE_SCHEDULED_RESTARTS="yes"
DEFAULT_RESTART_ON_CALENDAR="*-*-* 06:00:00"
DEFAULT_ENABLE_RESTART_WARNINGS="yes"
DEFAULT_RESTART_WARNING_INTERVALS="15 5 1"
DEFAULT_FINAL_RESTART_WARNING_SECONDS="10"

DEFAULT_KEEP_HOURLY="24"
DEFAULT_KEEP_DAILY="7"
DEFAULT_KEEP_WEEKLY="4"

DEFAULT_ENABLE_OFFSITE_BACKUP="no"
DEFAULT_OFFSITE_TARGET=""

DEFAULT_SHUTDOWN_TIMEOUT="60"
DEFAULT_MAX_BACKUP_AGE_HOURS="24"
DEFAULT_CRASH_LOCK_THRESHOLD="3"
DEFAULT_CRASH_LOCK_WINDOW_MINUTES="15"
DEFAULT_CRASH_RESTART_BACKOFF_SECONDS="15"

DEFAULT_MIN_FREE_MB_START="2048"
DEFAULT_MIN_FREE_MB_BACKUP="2048"
DEFAULT_MIN_FREE_MB_RESTORE="4096"

mkdir -p \
  "${SERVER_CONFIG_DIR}" \
  "${ARCHIVED_CONFIG_DIR}" \
  "${TEMPLATES_DIR}" \
  "${SERVERS_DIR}" \
  "${STATE_DIR}" \
  "${LOGS_DIR}" \
  "${EVENTS_DIR}" \
  "${RESTORE_DIR}" \
  "${TMP_DIR}" \
  "${CRASH_DIR}" \
  "${LOCAL_BACKUPS_DIR}" \
  "${BACKUP_MANIFESTS_DIR}" \
  "${ARCHIVE_SERVERS_DIR}" \
  "${ARCHIVE_BACKUPS_DIR}"
